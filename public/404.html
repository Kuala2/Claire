<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Страница не найдена | Клэр</title>
    <meta name="robots" content="noindex, follow" />
    <style>
      body {
        margin: 0;
        font-family: Inter, Arial, sans-serif;
        background: #fafafa;
        color: #1f2937;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        max-width: 560px;
        width: 100%;
        background: #fff;
        border-radius: 18px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        padding: 32px;
        text-align: center;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 32px;
      }
      p {
        margin: 0 0 20px;
        line-height: 1.6;
      }
      a {
        display: inline-block;
        background: #c102b0;
        color: #fff;
        text-decoration: none;
        padding: 12px 20px;
        border-radius: 999px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>404</h1>
      <p>Страница не найдена. Возможно, ссылка устарела или была введена с ошибкой.</p>
      <a href="/">Вернуться на главную</a>
    </main>
  </body>
</html>
